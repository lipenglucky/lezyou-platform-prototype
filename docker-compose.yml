# 乐自由平台 · 阿里云 ECS 一键部署（应用 + PostgreSQL）
# 内测：cp .env.internal.example .env 后执行
#   docker compose -f docker-compose.yml -f docker-compose.internal.yml up -d --build
# 正式：cp .env.production.example .env 后执行
#   docker compose up -d --build

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lezyou}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 设置 POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lezyou}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lezyou} -d ${POSTGRES_DB:-lezyou}"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-on}
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-lezyou}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-lezyou}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?请在 .env 设置 AUTH_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      DEMO_CODE_ENABLED: ${DEMO_CODE_ENABLED:-on}
      DEMO_VERIFICATION_CODE: ${DEMO_VERIFICATION_CODE:-888888}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-sandbox}
      PAYMENT_SANDBOX_AUTOCONFIRM: ${PAYMENT_SANDBOX_AUTOCONFIRM:-true}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      CRON_SECRET: ${CRON_SECRET:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-}
      SMS_ACCESS_KEY_ID: ${SMS_ACCESS_KEY_ID:-}
      SMS_ACCESS_KEY_SECRET: ${SMS_ACCESS_KEY_SECRET:-}
      SMS_SIGN_NAME: ${SMS_SIGN_NAME:-}
      SMS_TEMPLATE_CODE: ${SMS_TEMPLATE_CODE:-}
      WECHAT_PAY_APPID: ${WECHAT_PAY_APPID:-}
      WECHAT_PAY_MCH_ID: ${WECHAT_PAY_MCH_ID:-}
      WECHAT_PAY_SERIAL_NO: ${WECHAT_PAY_SERIAL_NO:-}
      WECHAT_PAY_PRIVATE_KEY: ${WECHAT_PAY_PRIVATE_KEY:-}
      WECHAT_PAY_APIV3_KEY: ${WECHAT_PAY_APIV3_KEY:-}
      WECHAT_PAY_PLATFORM_PUBLIC_KEY: ${WECHAT_PAY_PLATFORM_PUBLIC_KEY:-}
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY:-}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-}
      ALIPAY_GATEWAY: ${ALIPAY_GATEWAY:-https://openapi.alipay.com/gateway.do}
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/auth/me').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  pgdata:
